# Persistent local Postgres for day-to-day development.
# Separate from docker-compose.test.yml so `make db-down-test` (which drops
# the test volume) never wipes your dev data.
#
# Port 55434 is chosen to sit one above the test DB (:55433) and avoid
# collision with other local namuh projects (e.g. namuh-send on :55432).
#
# Usage:
#   make db-up-dev          # bring up
#   make db-migrate-dev     # apply migrations to the dev DB
#   make db-down-dev        # stop (volume preserved — data survives)

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: opengithub-postgres-dev
    environment:
      POSTGRES_USER: opengithub
      POSTGRES_PASSWORD: opengithub
      POSTGRES_DB: opengithub_dev
    ports:
      - "55434:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengithub -d opengithub_dev"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres_dev_data:
